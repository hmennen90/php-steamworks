name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: PHP ${{ matrix.php }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
        php: ['8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config
          coverage: none

      - name: Build extension with mock SDK
        run: |
          phpize
          ./configure --with-steamworks --enable-steamworks-mock
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Verify extension loads
        run: |
          php -dextension=$(pwd)/modules/steamworks.so -m | grep steamworks
          php -dextension=$(pwd)/modules/steamworks.so -r "if (!extension_loaded('steamworks')) { fwrite(STDERR, 'steamworks extension failed to load' . PHP_EOL); exit(1); } echo 'steamworks extension loaded' . PHP_EOL;"

      - name: Check all functions registered
        run: |
          php -dextension=$(pwd)/modules/steamworks.so -r "
            \$functions = [
              'steam_init', 'steam_shutdown', 'steam_run_callbacks',
              'steam_user_get_steam_id', 'steam_user_is_logged_on', 'steam_user_get_player_steam_level',
              'steam_friends_get_name', 'steam_friends_set_rich_presence', 'steam_friends_activate_overlay', 'steam_friends_activate_overlay_to_web_page',
              'steam_stats_set_achievement', 'steam_stats_clear_achievement', 'steam_stats_store',
              'steam_stats_get_int', 'steam_stats_set_int', 'steam_stats_get_float', 'steam_stats_set_float',
              'steam_stats_indicate_achievement_progress',
              'steam_stats_get_achievement',
              'steam_stats_get_achievement_unlock_time', 'steam_stats_get_num_achievements',
              'steam_stats_get_achievement_name', 'steam_stats_get_achievement_display_attribute',
              'steam_stats_reset_all_stats',
              'steam_stats_find_leaderboard', 'steam_stats_find_or_create_leaderboard',
              'steam_stats_upload_score', 'steam_stats_download_leaderboard_entries',
              'steam_stats_get_downloaded_entry', 'steam_stats_get_leaderboard_entry_count',
              'steam_get_call_result',
              'steam_remote_file_write', 'steam_remote_file_read', 'steam_remote_file_exists',
              'steam_remote_file_delete', 'steam_remote_file_list',
              'steam_apps_is_subscribed', 'steam_apps_is_dlc_installed',
              'steam_apps_get_app_id', 'steam_apps_get_language',
              'steam_apps_is_subscribed_app', 'steam_apps_get_current_beta_name',
              'steam_apps_get_earliest_purchase_time', 'steam_apps_get_installed_depots',
              'steam_apps_get_dlc_count', 'steam_apps_get_app_build_id',
              'steam_utils_get_app_id', 'steam_utils_is_overlay_enabled', 'steam_utils_get_country_code',
              'steam_utils_is_steam_deck',
              'steam_utils_get_steam_ui_language', 'steam_utils_get_server_real_time',
              'steam_utils_get_current_battery_power', 'steam_utils_get_seconds_since_app_active',
            ];
            \$ok = true;
            foreach (\$functions as \$fn) {
              if (!function_exists(\$fn)) {
                echo \"MISSING: \$fn\n\";
                \$ok = false;
              }
            }
            if (\$ok) echo \"All \" . count(\$functions) . \" functions registered.\n\";
            else exit(1);
          "

      - name: Test steam_init returns false (no Steam running)
        run: |
          php -dextension=$(pwd)/modules/steamworks.so -r "
            \$result = @steam_init();
            assert(\$result === false, 'steam_init() should return false without Steam');
            echo \"steam_init() correctly returned false\n\";
          "

      - name: Test mock API responses
        run: |
          php -dextension=$(pwd)/modules/steamworks.so -r "
            echo 'Player name: ' . steam_friends_get_name() . \"\n\";
            echo 'App ID: ' . steam_utils_get_app_id() . \"\n\";
            echo 'Country: ' . steam_utils_get_country_code() . \"\n\";
            echo 'Language: ' . steam_apps_get_language() . \"\n\";
            assert(steam_friends_get_name() === 'MockPlayer');
            assert(steam_utils_get_app_id() === 480);
            assert(steam_utils_get_country_code() === 'US');
            echo \"All mock responses correct.\n\";
          "

      - name: Install PHPUnit
        run: |
          curl -sL https://phar.phpunit.de/phpunit-10.phar -o phpunit.phar
          chmod +x phpunit.phar

      - name: Run PHPUnit tests
        run: |
          php -dextension=$(pwd)/modules/steamworks.so phpunit.phar \
            --bootstrap tests/bootstrap.php \
            --testdox \
            tests/

  build-and-test-windows:
    name: PHP ${{ matrix.php }} / windows-2022
    # Pin to windows-2022: its default MSVC toolset (14.44 / VS 2022) matches the
    # official php.net Windows binaries for PHP 8.4/8.5. windows-latest moved to the
    # VS 2026 image (toolset 14.51), which makes PHP 8.4+ refuse to load the DLL with
    # "linked with 14.51, but the core is linked with 14.44".
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP SDK
        id: setup-php-sdk
        uses: php/setup-php-sdk@v0.12
        with:
          version: ${{ matrix.php }}
          arch: x64
          ts: nts

      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: ${{ steps.setup-php-sdk.outputs.toolset }}

      - name: Build extension with mock SDK
        shell: cmd
        run: |
          call phpize || exit /b 1
          call configure --with-steamworks --enable-steamworks-mock --with-prefix=${{ steps.setup-php-sdk.outputs.prefix }} || exit /b 1
          nmake || exit /b 1

      - name: Enable required PHP extensions
        shell: cmd
        run: |
          echo extension_dir=${{ steps.setup-php-sdk.outputs.prefix }}\ext>> ${{ steps.setup-php-sdk.outputs.prefix }}\php.ini
          echo extension=php_mbstring.dll>> ${{ steps.setup-php-sdk.outputs.prefix }}\php.ini
          echo extension=php_openssl.dll>> ${{ steps.setup-php-sdk.outputs.prefix }}\php.ini

      - name: Find built DLL
        shell: cmd
        run: |
          echo EXT_DLL=%CD%\x64\Release\php_steamworks.dll>> %GITHUB_ENV%
          if not exist x64\Release\php_steamworks.dll (echo DLL not found & exit /b 1)

      - name: Verify extension loads
        shell: cmd
        run: |
          php -dextension=%EXT_DLL% -m || exit /b 1
          php -dextension=%EXT_DLL% -r "if (!extension_loaded('steamworks')) { fwrite(STDERR, 'steamworks extension failed to load' . PHP_EOL); exit(1); } echo 'steamworks extension loaded' . PHP_EOL;" || exit /b 1

      - name: Check all functions registered
        shell: cmd
        run: |
          php -dextension=%EXT_DLL% -r "$functions = ['steam_init', 'steam_shutdown', 'steam_run_callbacks', 'steam_user_get_steam_id', 'steam_user_is_logged_on', 'steam_user_get_player_steam_level', 'steam_friends_get_name', 'steam_friends_set_rich_presence', 'steam_friends_activate_overlay', 'steam_friends_activate_overlay_to_web_page', 'steam_stats_set_achievement', 'steam_stats_clear_achievement', 'steam_stats_store', 'steam_stats_get_int', 'steam_stats_set_int', 'steam_stats_get_float', 'steam_stats_set_float', 'steam_stats_indicate_achievement_progress', 'steam_stats_get_achievement', 'steam_stats_get_achievement_unlock_time', 'steam_stats_get_num_achievements', 'steam_stats_get_achievement_name', 'steam_stats_get_achievement_display_attribute', 'steam_stats_reset_all_stats', 'steam_stats_find_leaderboard', 'steam_stats_find_or_create_leaderboard', 'steam_stats_upload_score', 'steam_stats_download_leaderboard_entries', 'steam_stats_get_downloaded_entry', 'steam_stats_get_leaderboard_entry_count', 'steam_get_call_result', 'steam_remote_file_write', 'steam_remote_file_read', 'steam_remote_file_exists', 'steam_remote_file_delete', 'steam_remote_file_list', 'steam_apps_is_subscribed', 'steam_apps_is_dlc_installed', 'steam_apps_get_app_id', 'steam_apps_get_language', 'steam_apps_is_subscribed_app', 'steam_apps_get_current_beta_name', 'steam_apps_get_earliest_purchase_time', 'steam_apps_get_installed_depots', 'steam_apps_get_dlc_count', 'steam_apps_get_app_build_id', 'steam_utils_get_app_id', 'steam_utils_is_overlay_enabled', 'steam_utils_get_country_code', 'steam_utils_is_steam_deck', 'steam_utils_get_steam_ui_language', 'steam_utils_get_server_real_time', 'steam_utils_get_current_battery_power', 'steam_utils_get_seconds_since_app_active']; $ok = true; foreach ($functions as $fn) { if (!function_exists($fn)) { echo 'MISSING: ' . $fn . PHP_EOL; $ok = false; } } if ($ok) echo 'All ' . count($functions) . ' functions registered.' . PHP_EOL; else exit(1);"

      - name: Test steam_init returns false (no Steam running)
        shell: cmd
        run: |
          php -dextension=%EXT_DLL% -r "$result = @steam_init(); assert($result === false, 'steam_init() should return false without Steam'); echo 'steam_init() correctly returned false' . PHP_EOL;"

      - name: Test mock API responses
        shell: cmd
        run: |
          php -dextension=%EXT_DLL% -r "echo 'Player name: ' . steam_friends_get_name() . PHP_EOL; echo 'App ID: ' . steam_utils_get_app_id() . PHP_EOL; echo 'Country: ' . steam_utils_get_country_code() . PHP_EOL; echo 'Language: ' . steam_apps_get_language() . PHP_EOL; assert(steam_friends_get_name() === 'MockPlayer'); assert(steam_utils_get_app_id() === 480); assert(steam_utils_get_country_code() === 'US'); echo 'All mock responses correct.' . PHP_EOL;"

      - name: Install PHPUnit
        shell: cmd
        run: curl -sL https://phar.phpunit.de/phpunit-10.phar -o phpunit.phar

      - name: Run PHPUnit tests
        shell: cmd
        run: php -dextension=%EXT_DLL% phpunit.phar --bootstrap tests/bootstrap.php --testdox tests/

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Validate PHP stubs syntax
        run: php -l stubs/steamworks.php

      - name: Validate test syntax
        run: |
          for f in tests/*.php; do
            php -l "$f"
          done

      - name: Validate example syntax
        run: |
          for f in examples/*.php; do
            php -l "$f"
          done

  release:
    name: Tag & Release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-and-test, build-and-test-windows, static-analysis]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version from header
        id: version
        run: |
          VERSION=$(grep '#define PHP_STEAMWORKS_VERSION' src/php_steamworks.h | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
