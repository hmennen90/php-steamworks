name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: PHP ${{ matrix.php }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config
          coverage: none

      - name: Build extension with mock SDK
        run: |
          phpize
          ./configure --with-steamworks --enable-steamworks-mock
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Verify extension loads
        run: |
          php -dextension=$(pwd)/modules/steamworks.so -m | grep steamworks
          php -dextension=$(pwd)/modules/steamworks.so -r "var_dump(extension_loaded('steamworks'));"

      - name: Check all functions registered
        run: |
          php -dextension=$(pwd)/modules/steamworks.so -r "
            \$functions = [
              'steam_init', 'steam_shutdown', 'steam_run_callbacks',
              'steam_user_get_steam_id',
              'steam_friends_get_name', 'steam_friends_set_rich_presence', 'steam_friends_activate_overlay',
              'steam_stats_set_achievement', 'steam_stats_clear_achievement', 'steam_stats_store',
              'steam_stats_get_int', 'steam_stats_set_int', 'steam_stats_get_float', 'steam_stats_set_float',
              'steam_remote_file_write', 'steam_remote_file_read', 'steam_remote_file_exists',
              'steam_remote_file_delete', 'steam_remote_file_list',
              'steam_apps_is_subscribed', 'steam_apps_is_dlc_installed',
              'steam_apps_get_app_id', 'steam_apps_get_language',
              'steam_utils_get_app_id', 'steam_utils_is_overlay_enabled', 'steam_utils_get_country_code',
            ];
            \$ok = true;
            foreach (\$functions as \$fn) {
              if (!function_exists(\$fn)) {
                echo \"MISSING: \$fn\n\";
                \$ok = false;
              }
            }
            if (\$ok) echo \"All \" . count(\$functions) . \" functions registered.\n\";
            else exit(1);
          "

      - name: Test steam_init returns false (no Steam running)
        run: |
          php -dextension=$(pwd)/modules/steamworks.so -r "
            \$result = @steam_init();
            assert(\$result === false, 'steam_init() should return false without Steam');
            echo \"steam_init() correctly returned false\n\";
          "

      - name: Test mock API responses
        run: |
          php -dextension=$(pwd)/modules/steamworks.so -r "
            echo 'Player name: ' . steam_friends_get_name() . \"\n\";
            echo 'App ID: ' . steam_utils_get_app_id() . \"\n\";
            echo 'Country: ' . steam_utils_get_country_code() . \"\n\";
            echo 'Language: ' . steam_apps_get_language() . \"\n\";
            assert(steam_friends_get_name() === 'MockPlayer');
            assert(steam_utils_get_app_id() === 480);
            assert(steam_utils_get_country_code() === 'US');
            echo \"All mock responses correct.\n\";
          "

      - name: Install PHPUnit
        run: |
          curl -sL https://phar.phpunit.de/phpunit-10.phar -o phpunit.phar
          chmod +x phpunit.phar

      - name: Run PHPUnit tests
        run: |
          php -dextension=$(pwd)/modules/steamworks.so phpunit.phar \
            --bootstrap tests/bootstrap.php \
            --testdox \
            tests/

  build-and-test-windows:
    name: PHP ${{ matrix.php }} / windows-latest
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP SDK
        id: setup-php-sdk
        uses: php/setup-php-sdk@v0.12
        with:
          version: ${{ matrix.php }}
          arch: x64
          ts: nts

      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: ${{ steps.setup-php-sdk.outputs.toolset }}

      - name: Build extension with mock SDK
        shell: cmd
        run: |
          call phpize || exit /b 1
          call configure --with-steamworks --enable-steamworks-mock --with-prefix=${{ steps.setup-php-sdk.outputs.prefix }} || exit /b 1
          nmake || exit /b 1

      - name: Enable required PHP extensions
        shell: cmd
        run: |
          echo extension_dir=${{ steps.setup-php-sdk.outputs.prefix }}\ext>> ${{ steps.setup-php-sdk.outputs.prefix }}\php.ini
          echo extension=php_mbstring.dll>> ${{ steps.setup-php-sdk.outputs.prefix }}\php.ini
          echo extension=php_openssl.dll>> ${{ steps.setup-php-sdk.outputs.prefix }}\php.ini

      - name: Find built DLL
        shell: cmd
        run: |
          echo EXT_DLL=%CD%\x64\Release\php_steamworks.dll>> %GITHUB_ENV%
          if not exist x64\Release\php_steamworks.dll (echo DLL not found & exit /b 1)

      - name: Verify extension loads
        shell: cmd
        run: |
          php -dextension=%EXT_DLL% -m || exit /b 1
          php -dextension=%EXT_DLL% -r "var_dump(extension_loaded('steamworks'));" || exit /b 1

      - name: Check all functions registered
        shell: cmd
        run: |
          php -dextension=%EXT_DLL% -r "$functions = ['steam_init', 'steam_shutdown', 'steam_run_callbacks', 'steam_user_get_steam_id', 'steam_friends_get_name', 'steam_friends_set_rich_presence', 'steam_friends_activate_overlay', 'steam_stats_set_achievement', 'steam_stats_clear_achievement', 'steam_stats_store', 'steam_stats_get_int', 'steam_stats_set_int', 'steam_stats_get_float', 'steam_stats_set_float', 'steam_remote_file_write', 'steam_remote_file_read', 'steam_remote_file_exists', 'steam_remote_file_delete', 'steam_remote_file_list', 'steam_apps_is_subscribed', 'steam_apps_is_dlc_installed', 'steam_apps_get_app_id', 'steam_apps_get_language', 'steam_utils_get_app_id', 'steam_utils_is_overlay_enabled', 'steam_utils_get_country_code']; $ok = true; foreach ($functions as $fn) { if (!function_exists($fn)) { echo 'MISSING: ' . $fn . PHP_EOL; $ok = false; } } if ($ok) echo 'All ' . count($functions) . ' functions registered.' . PHP_EOL; else exit(1);"

      - name: Test steam_init returns false (no Steam running)
        shell: cmd
        run: |
          php -dextension=%EXT_DLL% -r "$result = @steam_init(); assert($result === false, 'steam_init() should return false without Steam'); echo 'steam_init() correctly returned false' . PHP_EOL;"

      - name: Test mock API responses
        shell: cmd
        run: |
          php -dextension=%EXT_DLL% -r "echo 'Player name: ' . steam_friends_get_name() . PHP_EOL; echo 'App ID: ' . steam_utils_get_app_id() . PHP_EOL; echo 'Country: ' . steam_utils_get_country_code() . PHP_EOL; echo 'Language: ' . steam_apps_get_language() . PHP_EOL; assert(steam_friends_get_name() === 'MockPlayer'); assert(steam_utils_get_app_id() === 480); assert(steam_utils_get_country_code() === 'US'); echo 'All mock responses correct.' . PHP_EOL;"

      - name: Install PHPUnit
        shell: cmd
        run: curl -sL https://phar.phpunit.de/phpunit-10.phar -o phpunit.phar

      - name: Run PHPUnit tests
        shell: cmd
        run: php -dextension=%EXT_DLL% phpunit.phar --bootstrap tests/bootstrap.php --testdox tests/

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Validate PHP stubs syntax
        run: php -l stubs/steamworks.php

      - name: Validate test syntax
        run: |
          for f in tests/*.php; do
            php -l "$f"
          done

      - name: Validate example syntax
        run: |
          for f in examples/*.php; do
            php -l "$f"
          done
