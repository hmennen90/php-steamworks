name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-24.04
    needs: []
    permissions:
      contents: write
    steps:
      - name: Wait for CI to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-regexp: ^(PHP|Static Analysis)
          wait-interval: 15

      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from header
        id: version
        run: |
          VERSION=$(grep '#define PHP_STEAMWORKS_VERSION' src/php_steamworks.h | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
